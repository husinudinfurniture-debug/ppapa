<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnergiScan</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- ================= LANDING ================= -->
<section id="landing" class="page active">
  <div class="card center">
    <h1>⚡ EnergiScan</h1>
    <p>Analisis konsumsi listrik dan simulasi tagihan secara cerdas</p>
    <button id="startBtn">Mulai</button>
  </div>
</section>

<!-- ================= INPUT ================= -->
<section id="inputPage" class="page">
  <div class="card">

    <h2>Input Data Energi</h2>

    <!-- VA -->
    <label>Golongan Listrik</label>
    <select id="vaSelect">
      <option value="" disabled selected>Pilih VA</option>
      <option value="415" data-va="450">450 VA Subsidi — 415/kWh</option>
      <option value="605" data-va="900">900 VA Subsidi — 605/kWh</option>
      <option value="1352" data-va="900">900 VA Non Subsidi — 1352/kWh</option>
      <option value="1444.7" data-va="1300">1300 VA — 1444.7/kWh</option>
      <option value="1444.7" data-va="2200">2200 VA — 1444.7/kWh</option>
      <option value="1699.53" data-va="3500">3500 VA — 1699.53/kWh</option>
    </select>

    <!-- PRESET -->
    <h3>Pilih Perangkat Umum</h3>
    <select id="presetSelect">
      <option value="">-- Pilih Perangkat --</option>
      <option value="Lampu LED|10">Lampu LED (10W)</option>
      <option value="TV LED|60">TV LED (60W)</option>
      <option value="Kulkas|100">Kulkas (100W)</option>
      <option value="AC 1/2 PK|350">AC 1/2 PK (350W)</option>
      <option value="AC 1 PK|750">AC 1 PK (750W)</option>
      <option value="Kipas Angin|50">Kipas Angin (50W)</option>
      <option value="Rice Cooker|400">Rice Cooker (400W)</option>
      <option value="Setrika|350">Setrika (350W)</option>
      <option value="Laptop|65">Laptop (65W)</option>
      <option value="Mesin Cuci|350">Mesin Cuci (350W)</option>
    </select>

    <!-- INPUT DEVICE -->
    <h3>Tambah Perangkat</h3>

    <input id="name" type="text" placeholder="Nama perangkat">
    <input id="power" type="number" placeholder="Daya (Watt)">
    <input id="qty" type="number" placeholder="Jumlah alat">
    <input id="hours" type="number" placeholder="Jam per hari">

    <select id="type">
      <option value="always">Always (24 jam)</option>
      <option value="routine">Routine (harian)</option>
      <option value="flexible">Flexible (kadang)</option>
    </select>

    <button id="addDevice">+ Tambah Perangkat</button>

    <!-- LIST -->
    <h3>Daftar Perangkat</h3>
    <ul id="deviceList"></ul>

    <button id="calculate">Hitung Energi</button>

  </div>
</section>

<!-- ================= RESULT ================= -->
<section id="resultPage" class="page">
  <div class="card">

    <h2>Hasil Analisis</h2>

    <!-- SUMMARY -->
    <div id="summary"></div>

    <!-- CHART -->
    <div style="height:300px;">
      <canvas id="chart"></canvas>
    </div>

    <!-- TABLE -->
    <div id="table"></div>

    <!-- ANALYSIS -->
    <div id="analysis"></div>

    <!-- RECOMMENDATION -->
    <div id="recommendation"></div>

    <button id="reset">Reset</button>

  </div>
</section>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
